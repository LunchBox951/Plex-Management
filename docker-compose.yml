# Plex Manager deployment. Install is the one-time admin step; everything after
# (setup, config, recovery) happens in the browser. See ADR-0003 / ADR-0005.
#
#   cp .env.example .env   # then adjust
#   docker compose up -d
#
# First-run setup needs no token — it is claimed by the first Plex server owner to
# sign in. Optional hardening: to ALSO gate setup behind a shared secret, add a
# PLEX_MANAGER_SETUP_TOKEN to .env before starting:
#   python - <<'PY' >> .env
#   import secrets
#   print(f"PLEX_MANAGER_SETUP_TOKEN={secrets.token_urlsafe(32)}")
#   PY
#
# Canary host: set PLEX_MANAGER_IMAGE=ghcr.io/<owner>/plex-manager:edge
# Release host: ...:stable (the default in .env.example)

services:
  plex-manager:
    image: ${PLEX_MANAGER_IMAGE:-ghcr.io/lunchbox951/plex-manager:stable}
    container_name: plex-manager
    restart: unless-stopped
    labels:
      # Both are required by the privileged sidecar. It will reject a name-only
      # or label-only match and never accepts an arbitrary target over HTTP.
      io.github.lunchbox951.plex-manager.update.target: "true"
      io.github.lunchbox951.plex-manager.update.image-ref: ${PLEX_MANAGER_IMAGE:-ghcr.io/lunchbox951/plex-manager:stable}
    env_file: .env
    environment:
      # Keep the in-container app and healthcheck on 8000. Use
      # PLEX_MANAGER_HOST_BIND / PLEX_MANAGER_HOST_PORT below for the host socket.
      PLEX_MANAGER_PORT: "8000"
      # Same value the ports mapping below publishes this container under —
      # handed to the container itself (not just used for the mapping) so the
      # app's own startup setup-URL hint (issue #65) can print a link that
      # actually resolves from the operator's browser instead of always
      # assuming the in-container port.
      PLEX_MANAGER_HOST_PORT: ${PLEX_MANAGER_HOST_PORT:-8000}
      # Optional hardening — never required. When set (here or via .env), first-run
      # setup ALSO demands this token; unset/empty boots tokenless and setup is
      # claimed by the first Plex server owner to sign in.
      PLEX_MANAGER_SETUP_TOKEN: ${PLEX_MANAGER_SETUP_TOKEN:-}
      # Private app<->sidecar bearer credential. The value is file-mounted, never
      # copied into an environment variable or Docker inspect output.
      PLEX_MANAGER_UPDATER_SECRET_FILE: /run/secrets/plex_manager_updater
    ports:
      - "${PLEX_MANAGER_HOST_BIND:-127.0.0.1}:${PLEX_MANAGER_HOST_PORT:-8000}:8000"
    volumes:
      # Config + database persist across updates and rollbacks.
      - plex-manager-data:/app/data
      # Required: paths selected in setup must be visible inside the container.
      - ${PLEX_MANAGER_MEDIA_ROOT:?set PLEX_MANAGER_MEDIA_ROOT in .env}:/media
      - ${PLEX_MANAGER_DOWNLOADS_ROOT:?set PLEX_MANAGER_DOWNLOADS_ROOT in .env}:/downloads
    secrets:
      - plex_manager_updater

  # Opt in at install time with:
  #   docker compose --profile auto-update up -d
  # Policy remains disabled by default and is configured later in the browser.
  # This is the ONLY service granted Docker authority; it has no published port
  # and runs only its small outbound updater process from the promoted app image.
  updater:
    profiles: ["auto-update"]
    image: ${PLEX_MANAGER_IMAGE:-ghcr.io/lunchbox951/plex-manager:stable}
    container_name: plex-manager-updater
    entrypoint: ["python", "-m", "plex_manager.updater"]
    user: "0:0"
    restart: unless-stopped
    read_only: true
    environment:
      PLEX_MANAGER_IMAGE: ${PLEX_MANAGER_IMAGE:-ghcr.io/lunchbox951/plex-manager:stable}
      PLEX_MANAGER_CONTAINER_NAME: plex-manager
      PLEX_MANAGER_UPDATER_DOCKER_SOCKET: /var/run/docker.sock
      PLEX_MANAGER_UPDATER_COORDINATOR_URL: http://plex-manager:8000/api/v1/internal/updates
      PLEX_MANAGER_UPDATER_SECRET_FILE: /run/secrets/plex_manager_updater
      PLEX_MANAGER_UPDATER_STATE_FILE: /var/lib/plex-manager-updater/state.json
      PLEX_MANAGER_UPDATER_POLL_SECONDS: ${PLEX_MANAGER_UPDATER_POLL_SECONDS:-30}
    volumes:
      # Docker socket access is host-root-equivalent. A read-only bind flag would
      # not restrict API methods, so the authority is disclosed honestly as rw.
      - ${PLEX_MANAGER_DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock:rw
      - plex-manager-updater-state:/var/lib/plex-manager-updater
    secrets:
      - plex_manager_updater
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=16m
    cap_drop: ["ALL"]
    security_opt:
      - no-new-privileges:true
    healthcheck:
      disable: true
    depends_on:
      plex-manager:
        condition: service_healthy

volumes:
  plex-manager-data:
  plex-manager-updater-state:

secrets:
  plex_manager_updater:
    # The committed placeholder is deliberately too short to authenticate. It
    # keeps the default, updater-profile-off deployment bootable without granting
    # Docker authority. Opt-in installs point this at their generated secret.
    file: ${PLEX_MANAGER_UPDATER_SECRET_SOURCE:-./docker/updater-disabled-secret}
