# Plex Manager deployment. Install is the one-time admin step; everything after
# (setup, config, recovery) happens in the browser. See ADR-0003 / ADR-0005.
#
#   cp .env.example .env   # then adjust
#   docker compose up -d
#
# First-run setup needs no token — it is claimed by the first Plex server owner to
# sign in. Optional hardening: to ALSO gate setup behind a shared secret, add a
# PLEX_MANAGER_SETUP_TOKEN to .env before starting:
#   python - <<'PY' >> .env
#   import secrets
#   print(f"PLEX_MANAGER_SETUP_TOKEN={secrets.token_urlsafe(32)}")
#   PY
#
# Canary host: set PLEX_MANAGER_IMAGE=ghcr.io/<owner>/plex-manager:edge
# Release host: ...:stable (the default in .env.example)

services:
  plex-manager:
    image: ${PLEX_MANAGER_IMAGE:-ghcr.io/lunchbox951/plex-manager:stable}
    container_name: plex-manager
    restart: unless-stopped
    env_file: .env
    environment:
      # Keep the in-container app and healthcheck on 8000. Use
      # PLEX_MANAGER_HOST_BIND / PLEX_MANAGER_HOST_PORT below for the host socket.
      PLEX_MANAGER_PORT: "8000"
      # Same value the ports mapping below publishes this container under —
      # handed to the container itself (not just used for the mapping) so the
      # app's own startup setup-URL hint (issue #65) can print a link that
      # actually resolves from the operator's browser instead of always
      # assuming the in-container port.
      PLEX_MANAGER_HOST_PORT: ${PLEX_MANAGER_HOST_PORT:-8000}
      # Same value the ports mapping below publishes this container's socket
      # under -- handed to the container itself (not just used for the
      # mapping) so the startup setup-URL hint can reflect a LAN/non-default
      # published bind instead of always assuming localhost (issue #294).
      PLEX_MANAGER_HOST_BIND: ${PLEX_MANAGER_HOST_BIND:-127.0.0.1}
      # Optional hardening — never required. When set (here or via .env), first-run
      # setup ALSO demands this token; unset/empty boots tokenless and setup is
      # claimed by the first Plex server owner to sign in.
      PLEX_MANAGER_SETUP_TOKEN: ${PLEX_MANAGER_SETUP_TOKEN:-}
    ports:
      - "${PLEX_MANAGER_HOST_BIND:-127.0.0.1}:${PLEX_MANAGER_HOST_PORT:-8000}:8000"
    volumes:
      # Config + database persist across updates and rollbacks.
      - plex-manager-data:/app/data
      # Required: paths selected in setup must be visible inside the container.
      - ${PLEX_MANAGER_MEDIA_ROOT:?set PLEX_MANAGER_MEDIA_ROOT in .env}:/media
      - ${PLEX_MANAGER_DOWNLOADS_ROOT:?set PLEX_MANAGER_DOWNLOADS_ROOT in .env}:/downloads

volumes:
  plex-manager-data:
