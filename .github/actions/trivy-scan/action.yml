name: "Trivy scan + SARIF upload (scoped)"
description: >
  Scan a container image with Trivy and upload SARIF to the Security tab as TWO
  distinct analysis categories so the persistent board stays both honest and
  actionable:

    * trivy-os      — OS packages, ignore-unfixed. Base-OS CVEs with no upstream
                      fix (perl-base, glibc, util-linux, ncurses — Essential
                      Debian packages this Python app never invokes and cannot
                      remove) are dropped; a fixable/newly-fixed OS CVE surfaces.
    * trivy-library — application libraries (pip/npm), UNFILTERED. Every library
                      CVE stays visible, including as-yet-unfixed ones, because a
                      dependency CVE is ours to pin / patch / drop even before an
                      upstream fix exists (we must not suppress those).

  The pkg-type split is driven via TRIVY_PKG_TYPES / TRIVY_IGNORE_UNFIXED env so
  it is robust across trivy-action input renames (vuln-type -> pkg-types).

inputs:
  image-ref:
    description: "The container image reference to scan."
    required: true

runs:
  using: composite
  steps:
    - name: Scan OS packages (Trivy — actionable only, ignore-unfixed)
      uses: aquasecurity/trivy-action@v0.36.0
      env:
        TRIVY_PKG_TYPES: os
        TRIVY_IGNORE_UNFIXED: "true"
      with:
        image-ref: ${{ inputs.image-ref }}
        format: sarif
        output: trivy-os.sarif
        severity: "UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL"
        exit-code: "0"

    - name: Upload OS results (category trivy-os)
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: trivy-os.sarif
        category: trivy-os

    - name: Scan app libraries (Trivy — unfiltered, unfixed stay visible)
      uses: aquasecurity/trivy-action@v0.36.0
      env:
        TRIVY_PKG_TYPES: library
      with:
        image-ref: ${{ inputs.image-ref }}
        format: sarif
        output: trivy-library.sarif
        severity: "UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL"
        exit-code: "0"

    - name: Upload library results (category trivy-library)
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: trivy-library.sarif
        category: trivy-library
