name: Container

# Builds the edge image.
#   build   — on a pull request: build + Trivy-scan WITHOUT publishing, so a
#             base-image bump or Dockerfile change is validated before it can
#             merge. Findings print to the job log (table format). The token is
#             read-only — a PR validation job never needs registry write.
#   publish — on a merge to main (and on a daily schedule): on a push it builds +
#             pushes two tags, then scans and uploads the SARIF to the Security
#             tab; on the schedule it re-scans the existing :edge (no build/push)
#             so the board stays fresh between merges. Tags:
#               :edge        — moving, what the canary (beta) fleet tracks
#               :edge-<sha>  — immutable, the handle promote.yml consumes
#             This is the ONLY job granted packages: write, and it never runs on
#             a pull request. Push and schedule share the one job (hence one SARIF
#             analysis category), so a scheduled rescan updates the same board.
# Releases are NOT built here — they are promoted (re-tagged by digest) from a
# validated edge image by promote.yml, so the stable fleet runs identical bytes.
# See ADR-0004.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Daily re-scan of :edge (via the `publish` job) so the Security board stays
    # fresh BETWEEN merges: an OS CVE currently suppressed by ignore-unfixed
    # re-surfaces the day Debian (or Trivy's DB) gains a fixed version, and a
    # newly-disclosed library CVE is caught even when no push happened. Without
    # this a suppressed finding would stay invisible until some unrelated merge
    # rebuilt and rescanned the image.
    - cron: "17 6 * * *"

# Least privilege by default; the publish job opts into more (below).
permissions:
  contents: read

concurrency:
  group: container-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # PR validation — the required "build" status check. Builds the image and runs
  # Trivy, printing every finding to the job log (table) so a vulnerable
  # base-image or Dockerfile change is visible before it can merge. Never logs
  # in or pushes, and holds only a read-only token.
  build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Resolve lowercase image name
        id: img
        env:
          OWNER: ${{ github.repository_owner }}
        run: echo "name=ghcr.io/${OWNER,,}/plex-manager" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - name: Build (load locally, no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: ${{ steps.img.outputs.name }}:pr
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image (Trivy — findings to the job log)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.img.outputs.name }}:pr
          # Table goes to stdout so the findings actually surface on a PR (SARIF
          # is for the Security tab and is not uploaded on PRs). Surface every
          # severity — the job log is the honest, complete tally. We do NOT gate
          # the build on it (exit-code 0): most base-image OS CVEs have no
          # upstream fix yet, so failing here would block every build forever.
          # Fixable findings are fixed in the Dockerfile instead.
          format: table
          severity: "UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL"
          exit-code: "0"

  # Publish (push) + rescan (schedule) — ONE job so both events upload under the
  # SAME auto-derived SARIF category (workflow + job name), which means: (a) the
  # scheduled rescan updates the same Security-tab analysis instead of forking a
  # second one, and (b) the pre-existing Trivy alerts (uploaded by the old,
  # uncategorized step) are continued/closed rather than orphaned. Only this job
  # carries packages: write, and it never runs on a pull request.
  publish:
    if: github.event_name == 'push' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - uses: actions/checkout@v7

      - name: Resolve lowercase image name
        id: img
        env:
          OWNER: ${{ github.repository_owner }}
        run: echo "name=ghcr.io/${OWNER,,}/plex-manager" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build + push only on a merge to main. On the schedule we re-scan the
      # already-published :edge, so there is nothing to build or push.
      - name: Compute tags
        id: meta
        if: github.event_name == 'push'
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.img.outputs.name }}
          tags: |
            type=raw,value=edge
            type=sha,prefix=edge-,format=short

      - name: Build and push
        id: build
        if: github.event_name == 'push'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # On push: scan the exact bytes just published (by digest). On schedule:
      # scan the current :edge from the registry (read-only pull).
      - name: Resolve scan target
        id: target
        env:
          NAME: ${{ steps.img.outputs.name }}
          DIGEST: ${{ steps.build.outputs.digest }}
          EVENT: ${{ github.event_name }}
        run: |
          if [ "$EVENT" = "push" ]; then
            echo "ref=${NAME}@${DIGEST}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${NAME}:edge" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare SARIF directory
        run: mkdir -p "${{ github.workspace }}/trivy-sarif"

      # Three Trivy passes, all written into trivy-sarif/ and uploaded together as
      # ONE analysis (single upload, no explicit category) so the OS/library/secret
      # results share the board without double-listing:
      #   * OS vulns, ignore-unfixed — drops base-OS CVEs with no upstream fix
      #     (perl-base, glibc, util-linux, ncurses: Essential Debian packages this
      #     Python app never invokes and cannot remove). scanners=vuln so this pass
      #     does not also run the secret scanner.
      - name: Trivy — OS vulnerabilities (ignore-unfixed)
        uses: aquasecurity/trivy-action@v0.36.0
        env:
          TRIVY_SCANNERS: vuln
          TRIVY_PKG_TYPES: os
          TRIVY_IGNORE_UNFIXED: "true"
        with:
          image-ref: ${{ steps.target.outputs.ref }}
          format: sarif
          output: trivy-sarif/os.sarif
          severity: "UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL"
          exit-code: "0"

      #   * Library vulns, UNFILTERED — a pip/npm CVE is ours to pin/patch/drop,
      #     so unfixed ones must stay visible; ignore-unfixed is NOT applied here.
      - name: Trivy — library vulnerabilities (unfiltered)
        uses: aquasecurity/trivy-action@v0.36.0
        env:
          TRIVY_SCANNERS: vuln
          TRIVY_PKG_TYPES: library
        with:
          image-ref: ${{ steps.target.outputs.ref }}
          format: sarif
          output: trivy-sarif/library.sarif
          severity: "UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL"
          exit-code: "0"

      #   * Secrets — a SINGLE dedicated pass, so an image secret is reported once
      #     (not once per pkg-type split). Complements the gitleaks source scan.
      - name: Trivy — image secrets
        uses: aquasecurity/trivy-action@v0.36.0
        env:
          TRIVY_SCANNERS: secret
        with:
          image-ref: ${{ steps.target.outputs.ref }}
          format: sarif
          output: trivy-sarif/secret.sarif
          exit-code: "0"

      # ONE upload, no explicit category: preserves the auto-derived category the
      # old single step used, so the pre-existing Trivy alerts are continued and
      # the no-upstream-fix OS ones are CLOSED (not orphaned under a new category).
      # The PR `build` job still prints the complete, unfiltered tally to its log.
      # Shrinking the base-image CVE surface for real is tracked as ADR #18.
      - name: Upload Trivy results (SARIF to the Security tab)
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-sarif
