name: Container

# Builds the edge image. On a merge to main it publishes two tags:
#   :edge          — moving, what the canary (beta) fleet tracks
#   :edge-<sha>    — immutable, the handle the promotion workflow consumes
# On a pull request it builds and scans the image WITHOUT publishing, so a
# base-image bump or Dockerfile change is validated before it can merge.
# Releases are NOT built here — they are promoted (re-tagged by digest) from a
# validated edge image by promote.yml, so the stable fleet runs identical bytes.
# See ADR-0004.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: write # only exercised on push to main (see the `if:` guards below)
  security-events: write

concurrency:
  group: container-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Resolve lowercase image name
        id: img
        env:
          OWNER: ${{ github.repository_owner }}
        run: echo "name=ghcr.io/${OWNER,,}/plex-manager" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      # Publishing only happens on a push to main. PR builds never log in or push
      # (Dependabot/fork PRs get a read-only token anyway), they just build + scan.
      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.img.outputs.name }}
          tags: |
            type=raw,value=edge
            type=sha,prefix=edge-,format=short

      - name: Build (push on main, load locally on PRs)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          load: ${{ github.event_name != 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          # On push the image is in the registry (scan by digest); on a PR it was
          # loaded into the local daemon (scan by the :edge tag).
          image-ref: ${{ github.event_name == 'push' && format('{0}@{1}', steps.img.outputs.name, steps.build.outputs.digest) || format('{0}:edge', steps.img.outputs.name) }}
          format: sarif
          output: trivy-results.sarif
          # Surface every finding, not just HIGH/CRITICAL — the Security tab is the
          # honest, complete tally. We do NOT gate the build on it (exit-code 0):
          # the bulk of base-image OS CVEs have no upstream fix yet, so failing
          # here would block every build forever. Fixable findings are fixed in
          # the Dockerfile instead.
          severity: "UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL"
          exit-code: "0"

      # Only the canonical main-branch scan updates the code-scanning dashboard.
      # PR scans surface in the job log without polluting the repo's alert tally.
      - name: Upload Trivy results
        if: github.event_name == 'push'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
