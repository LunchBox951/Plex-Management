name: Container

# Builds the edge image.
#   build   — on a pull request: build + Trivy-scan WITHOUT publishing, so a
#             base-image bump or Dockerfile change is validated before it can
#             merge. Findings print to the job log (table format). The token is
#             read-only — a PR validation job never needs registry write.
#   publish — on a merge to main: build + push two tags, then scan by digest and
#             upload the SARIF to the Security tab:
#               :edge        — moving, what the canary (beta) fleet tracks
#               :edge-<sha>  — immutable, the handle promote.yml consumes
#             This is the ONLY job granted packages: write, and it never runs on
#             a pull request.
# Releases are NOT built here — they are promoted (re-tagged by digest) from a
# validated edge image by promote.yml, so the stable fleet runs identical bytes.
# See ADR-0004.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Daily rescan of :edge so the Security board stays fresh BETWEEN merges: an
    # OS CVE currently suppressed by ignore-unfixed re-surfaces the day Debian (or
    # Trivy's DB) gains a fixed version, and a newly-disclosed library CVE is
    # caught even when no push happened. Without this, a suppressed finding would
    # stay invisible until some unrelated merge rebuilt and rescanned the image.
    - cron: "17 6 * * *"

# Least privilege by default; the publish job opts into more (below).
permissions:
  contents: read

concurrency:
  group: container-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # PR validation — the required "build" status check. Builds the image and runs
  # Trivy, printing every finding to the job log (table) so a vulnerable
  # base-image or Dockerfile change is visible before it can merge. Never logs
  # in or pushes, and holds only a read-only token.
  build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Resolve lowercase image name
        id: img
        env:
          OWNER: ${{ github.repository_owner }}
        run: echo "name=ghcr.io/${OWNER,,}/plex-manager" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - name: Build (load locally, no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: ${{ steps.img.outputs.name }}:pr
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image (Trivy — findings to the job log)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.img.outputs.name }}:pr
          # Table goes to stdout so the findings actually surface on a PR (SARIF
          # is for the Security tab and is not uploaded on PRs). Surface every
          # severity — the job log is the honest, complete tally. We do NOT gate
          # the build on it (exit-code 0): most base-image OS CVEs have no
          # upstream fix yet, so failing here would block every build forever.
          # Fixable findings are fixed in the Dockerfile instead.
          format: table
          severity: "UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL"
          exit-code: "0"

  # Publish on merge to main: build + push, then scan by digest and upload the
  # SARIF to the Security tab. Only this job carries packages: write, and it is
  # gated to push events so a pull-request run can never obtain registry write.
  publish:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - uses: actions/checkout@v7

      - name: Resolve lowercase image name
        id: img
        env:
          OWNER: ${{ github.repository_owner }}
        run: echo "name=ghcr.io/${OWNER,,}/plex-manager" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.img.outputs.name }}
          tags: |
            type=raw,value=edge
            type=sha,prefix=edge-,format=short

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Scan the just-published image by digest. The scoped composite action
      # uploads TWO SARIF categories: `trivy-os` (ignore-unfixed — only
      # actionable base-OS CVEs; the no-upstream-fix Essential Debian packages
      # this Python app never invokes are dropped) and `trivy-library` (pip/npm,
      # UNFILTERED — every library CVE stays visible, including unfixed ones,
      # since a dependency CVE is ours to pin/patch/drop). The PR `build` job
      # still prints the complete, unfiltered tally to its log. Shrinking the
      # base-image CVE surface for real (a low-CVE base) is tracked as ADR
      # follow-up #18.
      - name: Scan the published image (Trivy — SARIF to the Security tab)
        uses: ./.github/actions/trivy-scan
        with:
          image-ref: ${{ format('{0}@{1}', steps.img.outputs.name, steps.build.outputs.digest) }}

  # Scheduled rescan of the current :edge image so the Security board stays fresh
  # between merges (see the `schedule:` trigger comment). Read-only registry
  # pull; never builds, never pushes. Runs only on the schedule event.
  rescan:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - uses: actions/checkout@v7

      - name: Resolve lowercase image name
        id: img
        env:
          OWNER: ${{ github.repository_owner }}
        run: echo "name=ghcr.io/${OWNER,,}/plex-manager" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR (read-only pull)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Rescan :edge (Trivy — SARIF to the Security tab)
        uses: ./.github/actions/trivy-scan
        with:
          image-ref: ${{ steps.img.outputs.name }}:edge
