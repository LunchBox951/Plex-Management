name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # The required gate. Runs the full quality suite on the supported floor (3.12)
  # so a change can never pass CI while breaking the advertised
  # `requires-python = ">=3.12"`. Lint/format/type are interpreter-independent
  # (pinned to py312 in pyproject), so they run here once.
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check --output-format=github .
      - name: Format check (ruff)
        run: ruff format --check .
      - name: Type check (pyright --strict)
        run: pyright
      - name: Tests
        run: pytest

  # Also run the test suite on the version the container image ships (3.14), so
  # runtime or dependency behaviour that only differs on the newer interpreter is
  # caught. Static checks (ruff/pyright) are interpreter-independent and run once
  # in `quality` above, so this job only needs the tests.
  tests-py314:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Tests
        run: pytest
