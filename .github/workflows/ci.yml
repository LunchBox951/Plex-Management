name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # The required gate. Runs the full quality suite on the supported floor (3.12)
  # so a change can never pass CI while breaking the advertised
  # `requires-python = ">=3.12"`. Lint/format/type are interpreter-independent
  # (pinned to py312 in pyproject), so they run here once.
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -c requirements/runtime-constraints.txt -e ".[dev]"
      # Prove the committed OpenAPI doc still matches the wired backend. Combined
      # with the frontend job's client drift check, this gates the whole contract
      # chain: backend -> docs/api/openapi.json -> generated TS client. The
      # exporter is deterministic (SPA routes are include_in_schema=False), so a
      # diff here means a router/schema change wasn't re-exported + committed.
      - name: OpenAPI contract is fresh
        run: |
          python -m plex_manager.web.openapi_export
          git diff --exit-code docs/api/openapi.json
      - name: Lint (ruff)
        run: ruff check --output-format=github .
      - name: Format check (ruff)
        run: ruff format --check .
      - name: Type check (pyright --strict)
        run: pyright
      - name: Tests
        run: pytest

  # Also run the test suite on the version the container image ships (3.14), so
  # runtime or dependency behaviour that only differs on the newer interpreter is
  # caught. Static checks (ruff/pyright) are interpreter-independent and run once
  # in `quality` above, so this job only needs the tests.
  tests-py314:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -c requirements/runtime-constraints.txt -e ".[dev]"
      - name: Tests
        run: pytest

  # Frontend gates (ADR-0009). The typed client is generated from the exported
  # OpenAPI doc, so the drift check fails the build if the committed client no
  # longer matches the backend contract — keeping front and back in lockstep.
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Client contract drift (generated vs committed)
        run: npm run gen:check
      - name: Type check (tsc strict)
        run: npm run typecheck
      - name: Lint (eslint)
        run: npm run lint
      - name: Unit tests (vitest)
        run: npm run test
      - name: Build
        run: npm run build
