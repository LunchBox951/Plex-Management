name: Promote to stable

# Manually promote an already-built, already-tested edge image to the release
# channel. This re-tags by reference (no rebuild), so the release host runs the
# exact bytes validated on the canary host. Pass the IMMUTABLE edge-<sha> tag
# (shown in the Container workflow run) as the source for a precise promotion.
# See ADR-0004.

on:
  workflow_dispatch:
    inputs:
      source_tag:
        description: "Immutable source tag to promote, e.g. edge-abc1234"
        required: true
      version:
        description: "Release version to also assign, e.g. 1.4.0 (leave blank to tag :stable only). Only edge-<sha> images built from PR #344 onward carry the org.opencontainers.image.version label the gate reads; an older build has no label and CANNOT be promoted with a version (the gate fails closed) — promote a fresh build instead."
        required: false
        default: ""

permissions:
  contents: read
  packages: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      # Third-party actions pinned to a commit SHA (supply-chain hardening); the
      # trailing comment records the human-readable version the SHA resolves to.
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve lowercase image name
        id: img
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          echo "name=ghcr.io/${OWNER,,}/plex-manager" >> "$GITHUB_OUTPUT"

      - name: Validate inputs
        env:
          SOURCE_TAG: ${{ inputs.source_tag }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          # Promote only immutable edge-<sha> handles so :stable is exactly the
          # canary-proven image, never whatever the floating :edge points at now.
          if [[ "$SOURCE_TAG" == *[$'\r\n\t']* ]]; then
            echo "::error::Invalid source_tag: contains control characters"
            exit 1
          fi
          if [[ ! "$SOURCE_TAG" =~ ^edge-[A-Za-z0-9._-]+$ ]]; then
            echo "::error::Invalid source_tag (expected immutable edge-<sha>): '$SOURCE_TAG'"
            exit 1
          fi

          if [ -n "$VERSION" ]; then
            if [[ "$VERSION" == *[$'\r\n\t']* ]]; then
              echo "::error::Invalid version: contains control characters"
              exit 1
            fi
            if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "::error::Invalid version (expected x.y.z): '$VERSION'"
              exit 1
            fi
          fi

      # Fail-closed version gate (#231 / #114): the promoted edge-<sha> can predate
      # the current main tree, so this reads the __version__ actually BAKED INTO
      # that image (org.opencontainers.image.version, stamped by container.yml)
      # rather than trusting the checked-out repo. Only runs when the operator
      # supplied a version — a blank version (":stable" re-tag only, no x.y.z
      # bump) has nothing to compare against and is unchanged legacy behavior.
      # Every failure path here must be a hard failure, never a silent pass:
      #   - imagetools inspect errors (bad tag, registry/network issue, no
      #     provenance-index support) -> non-zero exit, caught below.
      #   - label present but empty, or absent entirely -> empty string, caught
      #     by the explicit blank check (Go templates render a missing map key
      #     as "" with exit 0, so the exit-code check alone is not enough).
      - name: "Gate: promoted version must match the image's baked label"
        if: inputs.version != ''
        env:
          IMAGE: ${{ steps.img.outputs.name }}
          SOURCE_TAG: ${{ inputs.source_tag }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          echo "Inspecting ${IMAGE}:${SOURCE_TAG} for org.opencontainers.image.version ..."

          # NOTE: build-push-action attaches provenance by default, which wraps
          # even this single-platform image in an OCI manifest INDEX (an
          # attestation manifest sits alongside the real linux/amd64 one, tagged
          # platform "unknown/unknown"). `--format '{{.Config.Labels}}'` errors
          # on that shape ("can't evaluate field Config in type
          # imagetools.tplInput") because the index has no single Config.
          # `.Image` is buildx's platform-resolved single-image view and is what
          # correctly skips the attestation manifest — verified against the real
          # ghcr.io/lunchbox951/plex-manager:edge image (see PR description).
          if ! baked_version=$(docker buildx imagetools inspect "${IMAGE}:${SOURCE_TAG}" \
              --format '{{index .Image.Config.Labels "org.opencontainers.image.version"}}'); then
            echo "::error::Could not read the manifest for ${IMAGE}:${SOURCE_TAG} (unreadable image/registry error) — refusing to promote. See the docker output above for details."
            exit 1
          fi

          if [ -z "$baked_version" ]; then
            echo "::error::${IMAGE}:${SOURCE_TAG} has no org.opencontainers.image.version label (or it is empty) — refusing to promote. Rebuild :edge from a commit that includes the OCI-label gate (container.yml) before retrying."
            exit 1
          fi

          if [ "$baked_version" != "$VERSION" ]; then
            echo "::error::Version mismatch: promoting version '${VERSION}' but ${IMAGE}:${SOURCE_TAG} was built with __version__ '${baked_version}'. Promote the edge-<sha> actually built from the commit where src/plex_manager/__init__.py was bumped to ${VERSION}, or correct the version input."
            exit 1
          fi

          echo "OK: ${IMAGE}:${SOURCE_TAG} is baked with version '${baked_version}', matches the operator-supplied input."

      - name: Promote (re-tag by reference, no rebuild)
        env:
          IMAGE: ${{ steps.img.outputs.name }}
          SOURCE_TAG: ${{ inputs.source_tag }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          tags=(--tag "${IMAGE}:stable")
          if [ -n "$VERSION" ]; then
            major_minor="${VERSION%.*}"
            tags+=(--tag "${IMAGE}:${VERSION}" --tag "${IMAGE}:${major_minor}")
          fi

          echo "Promoting ${IMAGE}:${SOURCE_TAG} -> ${tags[*]} (re-tag by reference, no rebuild)"
          docker buildx imagetools create "${tags[@]}" "${IMAGE}:${SOURCE_TAG}"
