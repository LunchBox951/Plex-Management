name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "21 3 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  codeql:
    name: codeql (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
    steps:
      - uses: actions/checkout@v7
      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
          config-file: ./.github/codeql/codeql-config.yml
      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

  # Branch protection requires a status check literally named ``analyze``. The
  # per-language matrix above reports ``codeql (python)`` / ``codeql
  # (javascript-typescript)`` -- distinct contexts that would leave the required
  # ``analyze`` check pending forever. This summary job re-publishes that single
  # required context and fails unless EVERY matrix leg succeeded (``needs`` rolls
  # the whole matrix up into one result), so the security gate is preserved.
  analyze:
    name: analyze
    needs: codeql
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Require every CodeQL language analysis to succeed
        run: |
          if [ "${{ needs.codeql.result }}" != "success" ]; then
            echo "CodeQL analysis did not succeed (result: ${{ needs.codeql.result }})."
            exit 1
          fi
          echo "All CodeQL language analyses succeeded."
