name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "33 4 * * 1"

permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      # Free for personal repos. If this repo ever moves under an organization,
      # gitleaks-action requires a GITLEAKS_LICENSE — or rely on GitHub's native
      # secret scanning (see the hardening checklist in SECURITY.md).
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install shipped runtime dependencies
        run: pip install -c requirements/runtime-constraints.txt -e ".[postgres]"
      - name: Audit dependencies for known vulnerabilities
        run: |
          pip install pip-audit
          pip-audit
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Audit shipped frontend dependencies
        working-directory: frontend
        run: npm audit --audit-level=high
